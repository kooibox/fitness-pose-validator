version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fitness-server
    restart: unless-stopped
    environment:
      - SERVER_DB_PATH=/data/server_data.db
      - PYTHONUNBUFFERED=1
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - LLM_RESPONSE_MODE=${LLM_RESPONSE_MODE:-json}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - server-data:/data
    ports:
      - "8080:8080"
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    image: nginx:alpine
    container_name: fitness-dashboard
    restart: unless-stopped
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - fitness-network
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  server-data:
    driver: local

networks:
  fitness-network:
    driver: bridge